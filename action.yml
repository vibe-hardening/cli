name: 'vibe-hardening'
description: 'Security scan for AI-generated code — 48 rules, 9 live key verifiers, MIT open source. Catches what gitleaks misses.'
author: 'angletech2026'
branding:
  icon: 'lock'
  color: 'red'

inputs:
  cwd:
    description: 'Directory to scan, relative to the repository root.'
    required: false
    default: '.'
  severity:
    description: 'Minimum severity to report: info | low | medium | high | critical. CI workflows usually want `high` to avoid noise.'
    required: false
    default: 'info'
  format:
    description: 'Output format: console | json | html.'
    required: false
    default: 'console'
  output:
    description: 'Optional output file path (e.g. `vh-report.html`). Pair with actions/upload-artifact to surface on the PR page.'
    required: false
    default: ''
  changed-only:
    description: 'Only scan files changed against this ref (e.g. `origin/${{ github.base_ref }}` for PR scans). Requires `actions/checkout` with `fetch-depth: 0`. Leave blank for a full repo scan. Empty / `origin/` values are silently treated as blank.'
    required: false
    default: ''
  verify:
    description: 'Run --verify --own to live-check leaked keys against provider APIs.'
    required: false
    default: 'false'
  roast:
    description: 'Use --roast for dry brutalist one-liners. Console-only — JSON / HTML stay professional.'
    required: false
    default: 'false'
  version:
    description: 'vibe-hardening npm version to install. Pin a specific version (e.g. `0.0.13-preview.0`) for reproducible CI; `latest` follows new releases.'
    required: false
    default: 'latest'

outputs:
  exit-code:
    description: 'Scan exit code (0 = clean, 1 = critical/high findings, 2 = config error). Useful with `continue-on-error: true` to gate downstream steps without failing the action.'
    value: ${{ steps.scan.outputs.exit-code }}

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run vibe-hardening
      id: scan
      shell: bash
      # CRITICAL: every input is exported as an env var, NOT
      # interpolated into the bash script body via ${{ }}. Direct
      # interpolation would let a malicious workflow caller smuggle
      # `; rm -rf /` or `$(...)` through any input value, since
      # GitHub Actions templates the YAML before bash parses it.
      # Reading via $INPUT_X means bash sees the value as a literal
      # string, not as additional script text.
      env:
        INPUT_CWD: ${{ inputs.cwd }}
        INPUT_SEVERITY: ${{ inputs.severity }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_CHANGED_ONLY: ${{ inputs.changed-only }}
        INPUT_VERIFY: ${{ inputs.verify }}
        INPUT_ROAST: ${{ inputs.roast }}
        INPUT_VERSION: ${{ inputs.version }}
        FORCE_COLOR: '1'
      run: |
        set -u
        ARGS=("scan" "$INPUT_CWD" "--severity" "$INPUT_SEVERITY" "--format" "$INPUT_FORMAT")

        if [ -n "$INPUT_OUTPUT" ]; then
          ARGS+=("--output" "$INPUT_OUTPUT")
        fi

        # `origin/` with no branch name happens when callers template
        # `origin/${{ github.base_ref }}` on a `push` event (base_ref
        # is empty there). Treat that as blank so we fall back to a
        # full scan instead of crashing on `git diff origin/`.
        if [ -n "$INPUT_CHANGED_ONLY" ] \
            && [ "$INPUT_CHANGED_ONLY" != "origin/" ] \
            && [ "$INPUT_CHANGED_ONLY" != "/" ]; then
          ARGS+=("--changed-only=$INPUT_CHANGED_ONLY")
        elif [ -n "$INPUT_CHANGED_ONLY" ]; then
          echo "::warning::changed-only=\"$INPUT_CHANGED_ONLY\" looks like an empty ref (probably an unset github.base_ref on a push event). Falling back to full scan."
        fi

        if [ "$INPUT_VERIFY" = "true" ]; then
          ARGS+=("--verify" "--own")
        fi
        if [ "$INPUT_ROAST" = "true" ]; then
          ARGS+=("--roast")
        fi

        # Use `set +e` so we can capture the exit code into the
        # action output before propagating failure. Without this the
        # script aborts immediately on any non-zero scan exit and
        # the output never gets written.
        set +e
        npx -y "vibe-hardening@$INPUT_VERSION" "${ARGS[@]}"
        code=$?
        echo "exit-code=$code" >> "$GITHUB_OUTPUT"
        exit $code
